<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>boxies</title>
    <link rel="icon" type="image/x-icon" href="/images by yin/mochabear.png" />
    <link rel="stylesheet" href="/fsd-projects/bouncing-box/Bounce.css" />
    <script type="text/javascript" src="jquery.min.js"></script>
    <script type="text/javascript" src="script.js" defer></script> <!-- defer renders html objects first then -->
  </head>
  <body class="board" id="board">
    <!-- Nav bar -->
    <nav class="navigation" id="navigation">

      <!-- HTML for the score -->
      <div class="score auto">Score: 0</div>

      <!-- HTML for the misses -->
      <div class="misses auto">Misses: 0</div>

      <!-- HTML for the accuracy -->
      <div class="accuracy auto">Accuracy: n/a</div>
      
      <!-- Links list -->
      <ul class="list">
        <li class="links">
          <a href="/index.html"> Home </a>
        </li>
        <li class="links">
          <a href="/portfolio.html"> Portfolio </a>
        </li>
      </ul>
    </nav>

    <!-- pregame interface -->
    <div class="startScreen">
      <div id="gameSettings">

        <!-- ingame box size -->
        <div class="settings" id="sizeDiv">

          <!-- div for the size difficulty modifier -->
          <div class="modifiers">
            <p> Size </p>
            <div class="changeDiv" id="sizeDecrease"> - </div>
            <div class="changeDiv" id="sizeIncrease"> + </div>
          </div>

          <!-- the visuals for the size level difficulty -->
          <div class="difficulty" id="sizeBars">
            <div class="levels"></div>
            <div class="levels"></div>
            <div class="levels"></div>
          </div>
        </div>

        <!-- ingame box speed -->
        <div class="settings" id="speedDiv">

          <!-- div for the speed difficulty modifier -->
          <div class="modifiers">
            <p> Speed </p>
            <div class="changeDiv" id="speedDecrease"> - </div>
            <div class="changeDiv" id="speedIncrease"> + </div>
          </div>

          <!-- the visuals for the speed difficulty -->
          <div class="difficulty" id="speedBars">
            <div class="levels"></div>
            <div class="levels"></div>
            <div class="levels"></div>
          </div>
        </div>

        <!-- amount of boxes in game -->
        <div class="settings" id="boxDiv">

          <!-- div for the boxes difficulty modifier -->
          <div class="modifiers">
            <p> Boxes </p>
            <div class="changeDiv" id="boxDecrease"> - </div>
            <div class="changeDiv" id="boxIncrease"> + </div>
          </div>

          <!-- the visuals for the boxes difficulty -->
          <div class="difficulty" id="boxBars">
            <div class="levels"></div>
          </div>
        </div>
      </div>

      <!-- div for the start button -->
      <div id="startDiv">
        <button id="startButton"> start game </button>
      </div>
    </div>

    <!-- Every element in the bouncing box -->
    <div class="main" id="bounceScreen">

      <!-- HTML for the box -->
      <div class="allbox" id="allbox" >
      </div>
    </div>

    <!-- the ending screen when the user misses enough times -->
    <div class="endScreen" id="endScreen">
      <p> you lost ! </p>

      <!-- clickable button to restart the game -->
      <button id="endButton"> end game ! </button>
    </div>
    <script>
      
    </script>
  </body>
</html>
